name: Check Closing Keyword

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  check-keyword:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check for closing keyword
        id: check
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if echo "$PR_BODY" | grep -iE \
            "(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+" \
            > /dev/null; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Post reminder if keyword missing
        if: steps.check.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const alreadyCommented = comments.data.some(c =>
              c.body.includes('does not contain a closing keyword')
            );

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 **Reminder:** This PR does not contain a closing keyword linked to a GitHub Issue.\n\nPlease update the PR description:\n\`\`\`\nCloses #<issue-number>\n\`\`\`\nThis ensures end-to-end traceability: Jira → Issue → PR → Merge.`
              });
            }

      - name: Fail if keyword missing
        if: steps.check.outputs.found == 'false'
        run: |
          echo "❌ PR must reference a GitHub Issue using a closing keyword."
          exit 1